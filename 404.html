<html>
<head>
    <style>
        * { margin: 0; padding: 0; }
        
        body {
            background: black;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            height: 100vh;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #website {
            position: relative;
            margin: 20px;
            color: #c41b2d;
            z-index: 1;
            font-family: monospace;
            font-size: 1.5em;
            white-space: pre;
        }

        #website::after {
            content: "|";
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <span id="website"></span>

    <script>
        var c = document.getElementById("c");
        var ctx = c.getContext("2d");

        c.height = window.innerHeight;
        c.width = window.innerWidth;

        var matrix = "SHAKORET76@#$%^&*()*&^%";
        matrix = matrix.split("");
        var font_size = 10;
        var columns = c.width / font_size;
        var drops = [];
        for(var x = 0; x < columns; x++) drops[x] = 1;

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
            ctx.fillRect(0, 0, c.width, c.height);
            ctx.fillStyle = "#c41b2d";
            ctx.font = font_size + "px arial";
            for(var i = 0; i < drops.length; i++) {
                var text = matrix[Math.floor(Math.random() * matrix.length)];
                ctx.fillText(text, i * font_size, drops[i] * font_size);
                if(drops[i] * font_size > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        const textElement = document.getElementById("website");
        const phrase1 = "Не хочешь прислушиваться к идиотам?";
        const phrase2 = "Становись умнее";
        
        let currentText = "";
        let isDeleting = false;
        let phraseIndex = 0;
        let charIndex = 0;

        function type() {
            const currentPhrase = phraseIndex === 0 ? phrase1 : phrase2;
            
            if (isDeleting) {
                currentText = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                currentText = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            textElement.innerHTML = currentText;

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentPhrase.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } 
            else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % 2;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        type();

        window.addEventListener('resize', () => {
            c.height = window.innerHeight;
            c.width = window.innerWidth;
        });
    </script>
</body>
</html>
